name: build

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.9'

jobs:
  # ───────────────────────────────────────────────────────────────────
  # Android
  # ───────────────────────────────────────────────────────────────────
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # .env is git-ignored. Use a CI secret if provided, else fall back
      # to the committed .env.example template (empty pepper).
      - name: Provision .env
        env:
          APP_PEPPER: ${{ secrets.APP_PEPPER }}
        run: |
          if [ -n "$APP_PEPPER" ]; then
            echo "APP_PEPPER=$APP_PEPPER" > .env
          elif [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "APP_PEPPER=" > .env
          fi

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: one-cred-android-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────
  # Windows
  # ───────────────────────────────────────────────────────────────────
  windows:
    name: Windows (exe)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Provision .env
        shell: pwsh
        env:
          APP_PEPPER: ${{ secrets.APP_PEPPER }}
        run: |
          if ($env:APP_PEPPER) {
            "APP_PEPPER=$env:APP_PEPPER" | Out-File -FilePath .env -Encoding ascii
          } elseif (Test-Path .env.example) {
            Copy-Item .env.example .env
          } else {
            "APP_PEPPER=" | Out-File -FilePath .env -Encoding ascii
          }

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Zip Windows build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath one-cred-windows.zip

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: one-cred-windows-${{ github.sha }}
          path: one-cred-windows.zip
          if-no-files-found: error
          retention-days: 14
