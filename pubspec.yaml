name: credential_manager
description: "A local-first developer credential manager."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9

  # Localization
  easy_localization: ^3.0.8

  # Build-time / runtime secrets
  flutter_dotenv: ^6.0.1

  # Storage
  sqflite: ^2.4.2+1
  sqflite_common_ffi: ^2.4.0+3
  path: ^1.9.1
  path_provider: ^2.1.5

  # State
  provider: ^6.1.5+1

  # Utility
  uuid: ^4.5.3

  # UI / animations
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  flutter_staggered_animations: ^1.1.1

  # Security
  local_auth: ^3.0.1
  cryptography: ^2.9.0
  file_selector: ^1.1.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0A0A10"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/translations/
